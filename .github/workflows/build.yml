name: Build DayCounter

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install NDK
      run: |
        wget -q https://dl.google.com/android/repository/android-ndk-r26b-linux.zip
        unzip -q android-ndk-r26b-linux.zip
        echo "NDK_PATH=$PWD/android-ndk-r26b" >> $GITHUB_ENV

    - name: Get ImGui
      run: |
        git clone https://github.com/ocornut/imgui.git --depth=1
        mkdir -p imgui_src
        cp imgui/*.h imgui_src/
        cp imgui/*.cpp imgui_src/
        cp imgui/backends/imgui_impl_opengl3.h imgui_src/
        cp imgui/backends/imgui_impl_opengl3.cpp imgui_src/

    - name: Build
      run: |
        mkdir -p build/libs
        cp libs/libpreloader.so build/libs/
        cd build
        cmake .. \
          -DCMAKE_TOOLCHAIN_FILE=$NDK_PATH/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_PLATFORM=android-24 \
          -DANDROID_STL=c++_shared
        make

    - name: Package
      run: |
        mkdir -p package
        cp build/libdaycounter.so package/
        cp manifest.json package/
        cd package
        zip -r ../DayCounter.zip .

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: DayCounter
        path: DayCounter.zip
